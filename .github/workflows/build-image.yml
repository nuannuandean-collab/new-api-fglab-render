name: Build FG LAB New API image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "deploy/new-api-fglab/**"
      - ".github/workflows/build-image.yml"

permissions:
  contents: read
  packages: write

env:
  UPSTREAM_REPO: QuantumNous/new-api
  UPSTREAM_REF: ebbe31553309b10ca743f968c173d8e48e75b846
  IMAGE_NAME: ghcr.io/nuannuandean-collab/new-api-fglab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout wrapper repository
        uses: actions/checkout@v4

      - name: Checkout upstream New API
        run: |
          git clone --no-checkout "https://github.com/${UPSTREAM_REPO}.git" /tmp/new-api
          cd /tmp/new-api
          git fetch --depth 1 origin "${UPSTREAM_REF}"
          git checkout "${UPSTREAM_REF}"

      - name: Apply FG LAB UI patch
        run: |
          cd /tmp/new-api
          git apply "${GITHUB_WORKSPACE}/deploy/new-api-fglab/ui.patch"
          mkdir -p web/classic/public/fglab
          cp "${GITHUB_WORKSPACE}/deploy/new-api-fglab/assets/fglab-mark.svg" web/classic/public/fglab/fglab-mark.svg
          base64 -d "${GITHUB_WORKSPACE}/deploy/new-api-fglab/assets/wei-da-avatar.png.b64" > web/classic/public/fglab/wei-da-avatar.png
          base64 -d "${GITHUB_WORKSPACE}/deploy/new-api-fglab/assets/makise-kurisu-avatar.png.b64" > web/classic/public/fglab/makise-kurisu-avatar.png

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: /tmp/new-api
          file: /tmp/new-api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
